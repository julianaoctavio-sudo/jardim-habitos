<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jardim de Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g50:#f0f7ee;--g600:#3a7a28;--g800:#1e4a12;--cream:#faf7f2;--creamdk:#f0ebe2;--tp:#1a1a18;--ts:#5a5a50;--tm:#9a9a88;--bd:rgba(0,0,0,0.08);--sh:0 2px 16px rgba(0,0,0,0.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--tp);min-height:100vh;}
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.acard{background:white;border:1px solid var(--bd);border-radius:24px;padding:48px;max-width:400px;width:90%;text-align:center;box-shadow:var(--sh);}
.atitle{font-family:'Fraunces',serif;font-size:28px;font-weight:400;margin-bottom:8px;}
.atitle em{font-style:italic;color:var(--g600);}
.asub{font-size:14px;color:var(--ts);margin-bottom:32px;line-height:1.6;}
.obtn{width:100%;padding:13px 20px;border-radius:12px;border:1.5px solid var(--bd);background:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all 0.15s;}
.obtn:hover{background:var(--cream);transform:translateY(-1px);}
.obtn svg{width:20px;height:20px;flex-shrink:0;}
#app{display:none;}
.topbar{background:white;border-bottom:1px solid var(--bd);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Fraunces',serif;font-size:19px;font-weight:400;color:var(--g800);}
.logo em{font-style:italic;color:var(--g600);}
.uavatar{width:34px;height:34px;border-radius:50%;background:#d4eacc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--g800);overflow:hidden;}
.uavatar img{width:100%;height:100%;object-fit:cover;}
.btnout{font-size:13px;color:var(--tm);background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:6px;font-family:'DM Sans',sans-serif;}
.btnout:hover{color:var(--tp);background:var(--creamdk);}
.main{max-width:1100px;margin:0 auto;padding:28px 20px;}
.mhdr{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.mnbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bd);background:white;cursor:pointer;font-size:15px;color:var(--ts);display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.mnbtn:hover{background:var(--g50);color:var(--g600);}
.mtitle{font-family:'Fraunces',serif;font-size:24px;font-weight:400;flex:1;}
.mtitle em{font-style:italic;color:var(--g600);}
.stats-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.stat-tile{background:white;border:1px solid var(--bd);border-radius:12px;padding:14px 18px;flex:1;min-width:100px;box-shadow:var(--sh);}
.stat-label{font-size:11px;color:var(--tm);margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:500;color:var(--tp);font-family:'Fraunces',serif;}
.stat-sub{font-size:11px;color:var(--tm);}
.garden-card{background:white;border:1px solid var(--bd);border-radius:16px;overflow:hidden;box-shadow:var(--sh);margin-bottom:24px;}
.garden-wrap{position:relative;}
.garden-wrap canvas{width:100%;height:120px;display:block;}
.gpill{position:absolute;bottom:8px;right:12px;background:rgba(255,255,255,0.92);border:1px solid var(--bd);border-radius:20px;padding:3px 11px;font-size:11px;font-weight:500;color:var(--g800);}
.garden-info{padding:12px 20px 14px;}
.garden-level{font-family:'Fraunces',serif;font-size:17px;font-weight:400;color:var(--tp);margin-bottom:8px;}
.ptrack{height:5px;background:var(--creamdk);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,#5fa843,#2e9475);transition:width 0.5s;}
.plabel{font-size:11px;color:var(--tm);}
.main-card{background:white;border:1px solid var(--bd);border-radius:16px;overflow:hidden;box-shadow:var(--sh);}
.main-card-hdr{padding:14px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.main-card-title{font-size:13px;font-weight:500;color:var(--ts);text-transform:uppercase;letter-spacing:0.08em;}
.btn-gerenciar{padding:8px 18px;border-radius:9px;background:var(--g600);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background 0.15s;}
.btn-gerenciar:hover{background:var(--g800);}
.person-sep{display:flex;align-items:center;gap:10px;padding:10px 22px 8px;background:var(--g50);border-bottom:1px solid var(--bd);}
.person-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:white;flex-shrink:0;}
.person-sep-name{font-size:13px;font-weight:500;color:var(--g800);}
.person-sep-stats{font-size:11px;color:var(--tm);margin-left:auto;}
.cat-row{padding:7px 22px 5px;background:var(--cream);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-name{font-size:10px;font-weight:500;color:var(--ts);text-transform:uppercase;letter-spacing:0.07em;}
.hscroll{overflow-x:auto;}
table.ht{width:100%;border-collapse:collapse;min-width:360px;}
.ht thead th{padding:7px 3px;text-align:center;font-size:10px;font-weight:400;color:var(--tm);border-bottom:1px solid var(--bd);white-space:nowrap;}
.ht thead th:first-child{text-align:left;padding-left:22px;width:180px;}
.ht tbody tr:hover{background:var(--g50);}
.ht tbody td{padding:7px 3px;text-align:center;border-bottom:1px solid rgba(0,0,0,0.04);vertical-align:middle;}
.ht tbody td:first-child{text-align:left;padding-left:22px;}
.hrow{display:flex;align-items:center;gap:7px;}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.htext{font-size:13px;color:var(--tp);}
.hbdg{font-size:10px;color:var(--tm);background:var(--creamdk);padding:2px 6px;border-radius:7px;white-space:nowrap;}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bd);background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.12s;}
.chk:not(.done):not(.fut):hover{border-color:#5fa843;background:var(--g50);}
.chk.done{border-color:transparent;}
.chk.done svg{display:block;}
.chk svg{display:none;width:11px;height:11px;}
.chk.tod{box-shadow:0 0 0 2px #4a9bb5;}
.chk.fut{opacity:0.2;pointer-events:none;}
.todm{font-size:9px;font-weight:500;color:#4a9bb5;}
.nohab{padding:20px;text-align:center;font-size:13px;color:var(--tm);}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:18px;padding:28px;width:92%;max-width:520px;box-shadow:0 24px 64px rgba(0,0,0,0.18);transform:translateY(14px);transition:transform 0.2s;max-height:90vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.modal-title{font-family:'Fraunces',serif;font-size:22px;font-weight:400;margin-bottom:18px;}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--creamdk);padding:4px;border-radius:10px;margin-bottom:20px;}
.tab-btn{flex:1;padding:9px 4px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--ts);transition:all 0.15s;}
.tab-btn.active{background:white;color:var(--tp);box-shadow:var(--sh);}
.pane{display:none;}
.pane.active{display:block;}
/* FORM */
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:500;color:var(--ts);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.06em;}
.fi{width:100%;padding:10px 13px;border:1px solid var(--bd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--tp);background:white;}
.fi:focus{outline:none;border-color:#5fa843;}
.swrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;}
.sw.sel{border-color:var(--tp);transform:scale(1.15);}
/* LIST ITEMS */
.mrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);}
.mrow:last-child{border-bottom:none;}
.mdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mname{flex:1;font-size:13px;color:var(--tp);}
.msub{font-size:11px;color:var(--tm);}
.mpts{font-size:11px;color:var(--tm);background:var(--creamdk);padding:2px 7px;border-radius:9px;white-space:nowrap;}
.bdel{padding:5px 11px;border-radius:7px;border:1px solid #fecaca;background:#fff5f5;color:#dc2626;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;white-space:nowrap;}
.bdel:hover{background:#fee2e2;}
.empty-msg{padding:12px 0;text-align:center;font-size:13px;color:var(--tm);}
.sep{height:1px;background:var(--bd);margin:16px 0;}
.sec-title{font-size:11px;font-weight:500;color:var(--ts);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;}
/* MODAL FOOTER */
.modal-footer{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);}
.bprim{flex:1;padding:11px;border-radius:9px;background:var(--g600);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background 0.15s;}
.bprim:hover{background:var(--g800);}
.bcanc{flex:1;padding:11px;border-radius:9px;background:none;color:var(--ts);border:1px solid var(--bd);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.bcanc:hover{background:var(--cream);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--tp);color:white;padding:11px 18px;border-radius:9px;font-size:13px;z-index:9999;transform:translateY(18px);opacity:0;transition:all 0.3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:700px){.topbar{padding:0 14px;}.stats-row{gap:8px;}}
</style>
</head>
<body>

<div id="auth">
  <div class="acard">
    <div style="font-size:36px;margin-bottom:16px;">🌱</div>
    <h1 class="atitle">Jardim de <em>Hábitos</em></h1>
    <p class="asub">Cultive seus hábitos e veja seu jardim florescer.</p>
    <button class="obtn" onclick="signIn('google')">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar com Google
    </button>
    <button class="obtn" onclick="signIn('github')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"/></svg>
      Entrar com GitHub
    </button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="logo">🌿 Jardim de <em>Hábitos</em></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="uavatar" id="uavatar">?</div>
      <button class="btnout" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="mhdr">
      <button class="mnbtn" onclick="changeMonth(-1)">&#8592;</button>
      <h1 class="mtitle" id="mtitle"></h1>
      <button class="mnbtn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="garden-card">
      <div class="garden-wrap"><canvas id="garden-canvas"></canvas><div class="gpill" id="gpill">🌿 Semente</div></div>
      <div class="garden-info">
        <div class="garden-level" id="glevel">Nível 1 — Semente</div>
        <div class="ptrack"><div class="pfill" id="pfill" style="width:0%"></div></div>
        <div class="plabel" id="plabel">0 / 50 pts para o próximo nível</div>
      </div>
    </div>
    <div class="main-card">
      <div class="main-card-hdr">
        <span class="main-card-title">Hábitos do mês</span>
        <button class="btn-gerenciar" onclick="openGerenciar()">⚙ Gerenciar</button>
      </div>
      <div id="habits-body"></div>
    </div>
  </div>
</div>

<!-- MODAL GERENCIAR -->
<div class="overlay" id="ov-gerenciar">
  <div class="modal">
    <div class="modal-title">⚙ Gerenciar</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('pessoas')">👤 Pessoas</button>
      <button class="tab-btn" onclick="switchTab('habitos')">✓ Hábitos</button>
      <button class="tab-btn" onclick="switchTab('categorias')">🏷 Categorias</button>
    </div>

    <!-- PESSOAS -->
    <div class="pane active" id="pane-pessoas">
      <div id="list-pessoas"></div>
      <div class="sep"></div>
      <div class="sec-title">Adicionar pessoa</div>
      <div class="fg"><label class="fl">Nome</label><input class="fi" id="p-name" placeholder="Ex: Maria, João..."/></div>
      <div class="fg"><label class="fl">Cor do avatar</label><div class="swrow" id="av-swatches"></div></div>
      <button class="bprim" style="width:100%;" onclick="savePerson()">+ Adicionar pessoa</button>
    </div>

    <!-- HÁBITOS -->
    <div class="pane" id="pane-habitos">
      <div class="fg"><label class="fl">Pessoa</label><select class="fi" id="sel-pessoa-hab" onchange="onChangePessoa()"></select></div>
      <div id="list-habitos"></div>
      <div class="sep"></div>
      <div class="sec-title">Adicionar hábito</div>
      <div class="fg"><label class="fl">Nome</label><input class="fi" id="h-name" placeholder="Ex: Meditar 10 minutos"/></div>
      <div class="fg"><label class="fl">Categoria</label><select class="fi" id="h-cat"></select></div>
      <div class="fg"><label class="fl">Pontos por dia</label><input class="fi" id="h-pts" type="number" min="1" max="100" value="5"/></div>
      <div class="fg"><label class="fl">Cor</label><div class="swrow" id="h-swatches"></div></div>
      <button class="bprim" style="width:100%;" onclick="saveHabit()">+ Adicionar hábito</button>
    </div>

    <!-- CATEGORIAS -->
    <div class="pane" id="pane-categorias">
      <div class="fg"><label class="fl">Pessoa</label><select class="fi" id="sel-pessoa-cat" onchange="onChangePessoaCat()"></select></div>
      <div id="list-categorias"></div>
      <div class="sep"></div>
      <div class="sec-title">Adicionar categoria</div>
      <div class="fg">
        <label class="fl">Nome</label>
        <input class="fi" id="cat-name" placeholder="Ex: Saúde, Estudos, Família..." style="font-size:15px;padding:12px 14px;"/>
      </div>
      <div class="fg"><label class="fl">Cor</label><div class="swrow" id="cat-swatches"></div></div>
      <button class="bprim" style="width:100%;" onclick="saveCat()">+ Adicionar categoria</button>
    </div>

    <div class="modal-footer">
      <button class="bcanc" onclick="closeGerenciar()">Fechar sem salvar</button>
      <button class="bprim" onclick="closeGerenciar()">Concluído</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://sfxkjpohlijxyvbzrabb.supabase.co';
const SB_KEY='sb_publishable_qJQDvdFTQauCM40w10ir8A_axz95xi6';
const {createClient}=supabase;
const db=createClient(SB_URL,SB_KEY);

const MES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const HCORS=['#5fa843','#4a9bb5','#e8a020','#c9607a','#2e9475','#7b6db5','#c86040','#8b6f4e'];
const ACORS=['#3a7a28','#1a5fa8','#a03060','#b87010','#1a6b50','#5a4a9a'];
const LEVELS=[{name:'Semente',min:0},{name:'Broto',min:50},{name:'Muda',min:150},{name:'Arbusto',min:300},{name:'Jardim florido',min:500},{name:'Jardim exuberante',min:800},{name:'Paraíso verde',min:1200}];

let user=null,yr=new Date().getFullYear(),mo=new Date().getMonth();
let people=[],selHC=HCORS[0],selAC=ACORS[0],selCC=HCORS[0],actPid=null;

async function signIn(p){await db.auth.signInWithOAuth({provider:p,options:{redirectTo:window.location.href}});}
async function logout(){await db.auth.signOut();location.reload();}

async function init(){
  const {data:{session}}=await db.auth.getSession();
  if(session){user=session.user;await startApp();}else showAuth();
  db.auth.onAuthStateChange(async(_,s)=>{if(s){user=s.user;await startApp();}else showAuth();});
}
function showAuth(){document.getElementById('auth').style.display='flex';document.getElementById('app').style.display='none';}
async function startApp(){
  document.getElementById('auth').style.display='none';document.getElementById('app').style.display='block';
  const meta=user.user_metadata;
  const el=document.getElementById('uavatar');
  if(meta.avatar_url)el.innerHTML=`<img src="${meta.avatar_url}" alt=""/>`;
  else el.textContent=(meta.full_name||user.email||'?')[0].toUpperCase();
  await loadAll();render();
}

async function loadAll(){
  const {data:pd}=await db.from('people').select('*').eq('user_id',user.id).order('created_at');
  let raw=pd||[];
  if(!raw.length){
    await db.from('people').insert({user_id:user.id,name:'Eu',color:ACORS[0]});
    const {data:p2}=await db.from('people').select('*').eq('user_id',user.id).order('created_at');
    raw=p2||[];
  }
  const fd=`${yr}-${String(mo+1).padStart(2,'0')}-01`;
  const ld=`${yr}-${String(mo+1).padStart(2,'0')}-${diasMes()}`;
  people=[];
  for(const p of raw){
    const {data:catd}=await db.from('categories').select('*').eq('person_id',p.id).order('created_at');
    const {data:hd}=await db.from('habits').select('*').eq('person_id',p.id).order('created_at');
    const {data:cd}=await db.from('habit_checks').select('*').eq('person_id',p.id).gte('check_date',fd).lte('check_date',ld);
    const chks={};(cd||[]).forEach(c=>{chks[`${c.habit_id}_${c.check_date}`]=c.id;});
    people.push({...p,cats:catd||[],habs:hd||[],chks});
  }
}

function diasMes(){return new Date(yr,mo+1,0).getDate();}
function hoje(){const n=new Date();return{y:n.getFullYear(),m:n.getMonth(),d:n.getDate()};}
function getLvl(pts){let i=0;for(let j=LEVELS.length-1;j>=0;j--){if(pts>=LEVELS[j].min){i=j;break;}}return i;}
function totalPts(){return people.reduce((t,p)=>{for(const k in p.chks){const hid=k.split('_')[0];const h=p.habs.find(x=>x.id==hid);if(h)t+=h.pts;}return t;},0);}
function totalChks(){return people.reduce((t,p)=>t+Object.keys(p.chks).length,0);}

async function toggle(pid,hid,day){
  const p=people.find(x=>x.id===pid);if(!p)return;
  const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const key=`${hid}_${ds}`;
  if(p.chks[key]){await db.from('habit_checks').delete().eq('id',p.chks[key]);delete p.chks[key];}
  else{const {data}=await db.from('habit_checks').insert({user_id:user.id,person_id:pid,habit_id:hid,check_date:ds}).select().single();if(data)p.chks[key]=data.id;}
  render();
}
async function changeMonth(d){mo+=d;if(mo>11){mo=0;yr++;}if(mo<0){mo=11;yr--;}await loadAll();render();}

function render(){
  document.getElementById('mtitle').innerHTML=`${MES[mo]} <em>${yr}</em>`;
  const pts=totalPts(),chks=totalChks();
  const li=getLvl(pts),lv=LEVELS[li],nx=LEVELS[li+1];
  const pi=pts-lv.min,pn=nx?nx.min-lv.min:1,pct=Math.min(100,Math.round(pi/pn*100));
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-tile"><div class="stat-label">Pontos</div><div class="stat-val">${pts}</div><div class="stat-sub">este mês</div></div>
    <div class="stat-tile"><div class="stat-label">Concluídos</div><div class="stat-val">${chks}</div><div class="stat-sub">hábitos feitos</div></div>
    <div class="stat-tile"><div class="stat-label">Nível</div><div class="stat-val">${li+1}</div><div class="stat-sub">${lv.name}</div></div>
    <div class="stat-tile"><div class="stat-label">Pessoas</div><div class="stat-val">${people.length}</div><div class="stat-sub">no jardim</div></div>`;
  document.getElementById('gpill').textContent=`🌿 ${lv.name}`;
  document.getElementById('glevel').textContent=`Nível ${li+1} — ${lv.name}`;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('plabel').textContent=nx?`${pi} / ${pn} pts para o próximo nível`:'Nível máximo!';
  drawG(document.getElementById('garden-canvas'),li);
  renderTable();
}

function renderTable(){
  const body=document.getElementById('habits-body');
  const days=diasMes(),hj=hoje();
  const total=people.reduce((t,p)=>t+p.habs.length,0);
  if(!total){body.innerHTML='<div class="nohab">Nenhum hábito. Clique em "⚙ Gerenciar" para começar.</div>';return;}
  const wrap=document.createElement('div');wrap.className='hscroll';
  const tbl=document.createElement('table');tbl.className='ht';
  let th='<thead><tr><th>Hábito</th>';
  for(let d=1;d<=days;d++){const it=hj.y===yr&&hj.m===mo&&hj.d===d;th+=`<th>${it?'<div class="todm">hoje</div>':''}${d}</th>`;}
  let tb='<tbody>';
  people.forEach(p=>{
    const pPts=Object.keys(p.chks).reduce((t,k)=>{const hid=k.split('_')[0];const h=p.habs.find(x=>x.id==hid);return h?t+h.pts:t;},0);
    tb+=`<tr><td colspan="${days+1}" style="padding:0;"><div class="person-sep"><div class="person-av" style="background:${p.color}">${p.name[0].toUpperCase()}</div><span class="person-sep-name">${p.name}</span><span class="person-sep-stats">${Object.keys(p.chks).length} feitos · ${pPts} pts</span></div></td></tr>`;
    if(!p.habs.length){tb+=`<tr><td colspan="${days+1}" class="nohab" style="text-align:left;padding-left:22px;font-size:12px;">Sem hábitos — abra ⚙ Gerenciar para adicionar.</td></tr>`;return;}
    const cats=p.cats||[];
    const byCat={__sem__:[]};cats.forEach(c=>{byCat[c.id]=[];});
    p.habs.forEach(h=>{if(h.category_id&&byCat[h.category_id]!==undefined)byCat[h.category_id].push(h);else byCat.__sem__.push(h);});
    const groups=[...cats.map(c=>({id:c.id,name:c.name,color:c.color}))];
    if(byCat.__sem__.length)groups.push({id:'__sem__',name:'Geral',color:'#9a9a88'});
    groups.forEach(g=>{
      const habs=byCat[g.id]||[];if(!habs.length)return;
      tb+=`<tr><td colspan="${days+1}" style="padding:0;"><div class="cat-row"><div class="cat-dot" style="background:${g.color}"></div><span class="cat-name">${g.name}</span></div></td></tr>`;
      habs.forEach(h=>{
        let r=`<tr><td><div class="hrow"><div class="hdot" style="background:${h.color}"></div><span class="htext">${h.name}</span><span class="hbdg">${h.pts}pts</span></div></td>`;
        for(let d=1;d<=days;d++){
          const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const key=`${h.id}_${ds}`,done=!!p.chks[key];
          const it=hj.y===yr&&hj.m===mo&&hj.d===d;
          const fut=yr>hj.y||(yr===hj.y&&mo>hj.m)||(yr===hj.y&&mo===hj.m&&d>hj.d);
          const cls=['chk',done?'done':'',it?'tod':'',fut?'fut':''].filter(Boolean).join(' ');
          r+=`<td><button class="${cls}" style="${done?`background:${h.color};`:''}" onclick="toggle('${p.id}','${h.id}',${d})"><svg viewBox="0 0 11 11" fill="none"><path d="M1 5.5l3 3 6-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button></td>`;
        }
        tb+=r+'</tr>';
      });
    });
  });
  tbl.innerHTML=`<thead><tr>${th.replace('<thead><tr>','')}</thead>${tb}</tbody>`;
  wrap.appendChild(tbl);body.innerHTML='';body.appendChild(wrap);
}

// MODAL GERENCIAR
function openGerenciar(){
  actPid=people[0]?.id||null;
  setupPessoasPane();

}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const tabs=['pessoas','habitos','categorias'];
    b.classList.toggle('active',tabs[i]===tab);
  });
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
}

function setupPessoasPane(){
  selAC=ACORS[0];

function renderListPessoas(){
  const el=document.getElementById('list-pessoas');

  el.innerHTML=people.map(p=>`
    <div class="mrow">
      <div class="mdot" style="background:${p.color}"></div>
      <span class="mname">${p.name}</span>
      <span class="mpts">${p.habs.length} hábitos</span>
      ${people.length>1?`<button class="bdel" onclick="delPerson('${p.id}')">Excluir</button>`:''}
    </div>`).join('');
}
function selAvatar(c,el){selAC=c;document.querySelectorAll('#av-swatches .sw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
async function savePerson(){
  const name=document.getElementById('p-name').value.trim();if(!name)return;
  const {data,error}=await db.from('people').insert({user_id:user.id,name,color:selAC}).select().single();
  if(error){toast('Erro ao salvar.');return;}
  people.push({...data,cats:[],habs:[],chks:{}});
  document.getElementById('p-name').value='';
  renderListPessoas();
  refreshPessoaSelects();
  render();toast(`${name} adicionado(a)!`);
}
async function delPerson(pid){
  if(!confirm('Excluir esta pessoa e todos os dados?'))return;
  await db.from('habit_checks').delete().eq('person_id',pid);
  await db.from('habits').delete().eq('person_id',pid);
  await db.from('categories').delete().eq('person_id',pid);
  const {error}=await db.from('people').delete().eq('id',pid);
  if(error){toast('Erro ao excluir.');return;}
  people=people.filter(p=>p.id!==pid);
  if(actPid===pid)actPid=people[0]?.id||null;
  renderListPessoas();refreshPessoaSelects();render();toast('Pessoa excluída!');
}

function selHab(c,el){selHC=c;document.querySelectorAll('#h-swatches .sw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
async function saveHabit(){
  const pid=document.getElementById('sel-pessoa-hab').value;
  const name=document.getElementById('h-name').value.trim();
  const pts=parseInt(document.getElementById('h-pts').value)||5;
  const catId=document.getElementById('h-cat').value||null;

async function delHabit(pid,hid){
  if(!confirm('Excluir hábito?'))return;
  await db.from('habit_checks').delete().eq('habit_id',hid);
  const {error}=await db.from('habits').delete().eq('id',hid);
  if(error){toast('Erro ao excluir.');return;}
  const p=people.find(x=>x.id===pid);
  if(p){p.habs=p.habs.filter(h=>h.id!==hid);Object.keys(p.chks).filter(k=>k.startsWith(hid+'_')).forEach(k=>delete p.chks[k]);}
  refreshHabitosList();render();toast('Hábito excluído!');
}

function getFloresMes(){return FLORES_MES[mo]||FLORES_MES[0];}

// GARDEN
function drawG(canvas,li){
  const ctx=canvas.getContext('2d'),W=canvas.offsetWidth||1000,H=120;
  canvas.width=W*(window.devicePixelRatio||1);canvas.height=H*(window.devicePixelRatio||1);
  ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);

  const flores=getFloresMes();
  const FC=flores.cores; // cores das flores do mês

  // Céu baseado no nível
  const sk=['#d4f0c0','#c8ecf0','#c0e4f8','#b8e8f4','#a8e0f0','#90d8e8','#78c8e0'];
  ctx.fillStyle=sk[Math.min(li,6)];ctx.fillRect(0,0,W,H);

  const gY=H-22;
  ctx.fillStyle='#8bc34a';ctx.fillRect(0,gY,W,10);
  ctx.fillStyle='#6d4c41';ctx.fillRect(0,gY+10,W,H-gY-10);

  sun(ctx,W-32,26,li);
  if(li>=2)cloud(ctx,50,22);
  if(li>=4)cloud(ctx,W*.55,18);

  if(li===0){
    // Semente
    ctx.fillStyle='#795548';ctx.beginPath();ctx.ellipse(W/2,gY-4,6,8,0.3,0,Math.PI*2);ctx.fill();
  } else if(li===1){
    // Broto
    sprout(ctx,W/2,gY,.85);
  } else if(li===2){
    // Muda — 1 planta + 2 flores da estação
    plant(ctx,W/2,gY,.85);
    flor(ctx,W*.22,gY,FC[0],.62,flores.tipo);
    flor(ctx,W*.78,gY,FC[1],.62,flores.tipo);
  } else if(li===3){
    // Arbusto — arbusto + 4 flores sazonais
    bush(ctx,W/2,gY,.95);
    flor(ctx,W*.08,gY,FC[0],.78,flores.tipo);
    flor(ctx,W*.26,gY,FC[1],.75,flores.tipo);
    flor(ctx,W*.74,gY,FC[2],.75,flores.tipo);
    flor(ctx,W*.92,gY,FC[0],.78,flores.tipo);
  } else if(li===4){
    // Jardim florido — 1 árvore + arbustos + flores da estação
    tree(ctx,W/2,gY,'#2e9475',1.0);
    bush(ctx,W*.15,gY,.68);bush(ctx,W*.85,gY,.68);
    [FC[0],FC[1],FC[2],FC[0],FC[1],FC[2]].forEach((c,i)=>
      flor(ctx,W*.06+W*.88*i/5,gY,c,.82,flores.tipo));
  } else if(li===5){
    // Jardim exuberante — 2 árvores + flores abundantes
    tree(ctx,W*.32,gY,'#2e9475',1.1);
    tree(ctx,W*.68,gY,'#1a6b4a',.95);
    bush(ctx,W*.07,gY,.72);bush(ctx,W*.93,gY,.72);
    [FC[0],FC[1],FC[2],FC[0],FC[1],FC[2],FC[0],FC[1]].forEach((c,i)=>
      flor(ctx,W*.03+W*.94*i/7,gY,c,.9,flores.tipo));
    // borboletas
    butterfly(ctx,W*.55,gY-55,FC[0]);
  } else {
    // Paraíso — 3 árvores + jardim completo + borboletas
    tree(ctx,W*.18,gY,'#2e9475',1.15);
    tree(ctx,W*.5,gY,'#1a6b4a',1.35);
    tree(ctx,W*.82,gY,'#2e9475',1.05);
    bush(ctx,W*.05,gY,.82);bush(ctx,W*.95,gY,.82);
    [FC[0],FC[1],FC[2],FC[0],FC[1],FC[2],FC[0],FC[1],FC[2],FC[0]].forEach((c,i)=>
      flor(ctx,W*.02+W*.96*i/9,gY,c,.98,flores.tipo));
    butterfly(ctx,W*.62,gY-65,FC[1]);
    butterfly(ctx,W*.28,gY-85,FC[0]);
  }

  // Label da flor do mês no canto
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.beginPath();ctx.roundRect(8,8,130,20,6);ctx.fill();
  ctx.fillStyle='#3a7a28';ctx.font='500 10px DM Sans, sans-serif';
  ctx.fillText(`🌸 ${flores.nome}`,14,21);
}

// Flor genérica com variações por tipo
function flor(c,x,y,col,s,tipo){
  tipo=tipo||'default';
  if(tipo==='hibisco')fHibisco(c,x,y,col,s);
  else if(tipo==='bouganvilea')fBouganvilea(c,x,y,col,s);
  else if(tipo==='ipe')fIpe(c,x,y,col,s);
  else if(tipo==='girassol')fGirassol(c,x,y,col,s);
  else if(tipo==='violeta')fVioleta(c,x,y,col,s);
  else if(tipo==='cosmos')fCosmos(c,x,y,col,s);
  else if(tipo==='ixora')fIxora(c,x,y,col,s);
  else flower(c,x,y,col,s);
}

// Hibisco — pétalas grandes arredondadas
function fHibisco(c,x,y,col,s){
  const fy=y-15*s-4*s;
  c.strokeStyle='#4caf50';c.lineWidth=1.3*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+4*s);c.stroke();
  c.fillStyle=col;
  for(let i=0;i<5;i++){
    const a=i/5*Math.PI*2-Math.PI/2;
    c.beginPath();
    c.ellipse(x+Math.cos(a)*6*s,fy+Math.sin(a)*6*s,5*s,8*s,a,0,Math.PI*2);
    c.fill();
  }
  c.fillStyle='#ffff00';c.beginPath();c.arc(x,fy,3.5*s,0,Math.PI*2);c.fill();
  // estame
  c.strokeStyle='#ffeb3b';c.lineWidth=0.8*s;
  c.beginPath();c.moveTo(x,fy);c.lineTo(x,fy-5*s);c.stroke();
}

// Bouganvílea — brácteas triangulares
function fBouganvilea(c,x,y,col,s){
  const fy=y-14*s;
  c.strokeStyle='#4caf50';c.lineWidth=1.3*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(x,fy);c.stroke();
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    c.fillStyle=col;
    c.beginPath();
    c.moveTo(x,fy);
    c.lineTo(x+Math.cos(a-0.3)*8*s,fy+Math.sin(a-0.3)*8*s);
    c.lineTo(x+Math.cos(a+0.3)*8*s,fy+Math.sin(a+0.3)*8*s);
    c.closePath();c.fill();
  }
  c.fillStyle='#fff9c4';c.beginPath();c.arc(x,fy,2*s,0,Math.PI*2);c.fill();
}

// Ipê — flores em cachos, sem folhas
function fIpe(c,x,y,col,s){
  const fy=y-14*s;
  c.strokeStyle='#795548';c.lineWidth=1.5*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+2*s);c.stroke();
  for(let i=0;i<5;i++){
    const a=i/5*Math.PI*2;
    const fx=x+Math.cos(a)*4*s,ff=fy+Math.sin(a)*4*s;
    c.fillStyle=col;
    c.beginPath();
    c.ellipse(fx,ff,3.5*s,5*s,a,0,Math.PI*2);
    c.fill();
  }
  c.fillStyle='rgba(255,255,150,0.7)';c.beginPath();c.arc(x,fy,2*s,0,Math.PI*2);c.fill();
}

// Girassol — pétalas longas ao redor de disco escuro
function fGirassol(c,x,y,col,s){
  const fy=y-15*s;
  c.strokeStyle='#388e3c';c.lineWidth=2*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+3*s);c.stroke();
  c.fillStyle=col;
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    c.beginPath();
    c.ellipse(x+Math.cos(a)*7*s,fy+Math.sin(a)*7*s,2*s,5*s,a,0,Math.PI*2);
    c.fill();
  }
  c.fillStyle='#4e342e';c.beginPath();c.arc(x,fy,5*s,0,Math.PI*2);c.fill();
  c.fillStyle='#795548';c.beginPath();c.arc(x,fy,3.5*s,0,Math.PI*2);c.fill();
}

// Violeta — pétalas assimétricas
function fVioleta(c,x,y,col,s){
  const fy=y-13*s;
  c.strokeStyle='#4caf50';c.lineWidth=1.2*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+3*s);c.stroke();
  const shapes=[{dx:0,dy:-6,rx:3,ry:5},{dx:5,dy:-3,rx:3,ry:4},{dx:-5,dy:-3,rx:3,ry:4},{dx:4,dy:2,rx:4,ry:3},{dx:-4,dy:2,rx:4,ry:3}];
  shapes.forEach(p=>{
    c.fillStyle=col;c.beginPath();
    c.ellipse(x+p.dx*s,fy+p.dy*s,p.rx*s,p.ry*s,0,0,Math.PI*2);c.fill();
  });
  c.fillStyle='#fff176';c.beginPath();c.arc(x,fy,2.5*s,0,Math.PI*2);c.fill();
}

// Cosmos — pétalas finas alongadas
function fCosmos(c,x,y,col,s){
  const fy=y-14*s;
  c.strokeStyle='#4caf50';c.lineWidth=1.2*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+3*s);c.stroke();
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    c.fillStyle=col;
    c.beginPath();
    c.ellipse(x+Math.cos(a)*5.5*s,fy+Math.sin(a)*5.5*s,2*s,6*s,a,0,Math.PI*2);
    c.fill();
  }
  c.fillStyle='#fdd835';c.beginPath();c.arc(x,fy,3*s,0,Math.PI*2);c.fill();
}

// Ixora — pequenas flores em cacho redondo
function fIxora(c,x,y,col,s){
  const fy=y-14*s;
  c.strokeStyle='#4caf50';c.lineWidth=1.3*s;
  c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+2*s);c.stroke();
  for(let i=0;i<7;i++){
    const a=i/7*Math.PI*2;
    const fx=x+Math.cos(a)*4.5*s,ff=fy+Math.sin(a)*4.5*s;
    c.fillStyle=col;c.beginPath();
    for(let j=0;j<4;j++){const b=j/4*Math.PI*2;c.arc(fx+Math.cos(b)*1.8*s,ff+Math.sin(b)*1.8*s,1.5*s,0,Math.PI*2);}
    c.fill();
  }
  c.fillStyle=col;c.beginPath();c.arc(x,fy,3*s,0,Math.PI*2);c.fill();
}

// Borboleta
function butterfly(c,x,y,col){
  c.fillStyle=col+'aa';
  c.beginPath();c.ellipse(x-7,y,7,5,-0.4,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(x+7,y,7,5,0.4,0,Math.PI*2);c.fill();
  c.fillStyle='#5d4037';c.beginPath();c.ellipse(x,y,2,6,0,0,Math.PI*2);c.fill();
}

function sprout(c,x,y,s){c.strokeStyle='#4caf50';c.lineWidth=2*s;c.beginPath();c.moveTo(x,y);c.lineTo(x,y-22*s);c.stroke();c.fillStyle='#66bb6a';c.beginPath();c.ellipse(x-7*s,y-16*s,7*s,4.5*s,-.5,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(x+8*s,y-22*s,7*s,4.5*s,.5,0,Math.PI*2);c.fill();}
function plant(c,x,y,s){c.strokeStyle='#388e3c';c.lineWidth=2.5*s;c.beginPath();c.moveTo(x,y);c.lineTo(x,y-32*s);c.stroke();c.fillStyle='#4caf50';for(let i=0;i<3;i++){c.beginPath();c.ellipse(i%2===0?x-11*s:x+11*s,y-13*s-i*10*s,10*s,6*s,i%2===0?-.4:.4,0,Math.PI*2);c.fill();}}
function bush(c,x,y,s){[['#388e3c',0,-20,14],['#4caf50',-12,-12,11],['#4caf50',12,-12,11],['#66bb6a',-6,-29,9],['#66bb6a',6,-29,9]].forEach(([col,dx,dy,r])=>{c.fillStyle=col;c.beginPath();c.arc(x+dx*s,y+dy*s,r*s,0,Math.PI*2);c.fill();});}
function tree(c,x,y,col,s){c.fillStyle='#795548';c.fillRect(x-4.5*s,y-40*s,9*s,40*s);c.fillStyle=col;c.beginPath();c.arc(x,y-68*s,24*s,0,Math.PI*2);c.fill();c.fillStyle='#1a5c38';c.beginPath();c.arc(x,y-88*s,18*s,0,Math.PI*2);c.fill();c.fillStyle=col;c.beginPath();c.arc(x,y-102*s,13*s,0,Math.PI*2);c.fill();}
function flower(c,x,y,col,s){const fy=y-13*s-4*s;c.strokeStyle='#4caf50';c.lineWidth=1.3*s;c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+4*s);c.stroke();c.fillStyle=col;for(let i=0;i<6;i++){const a=i/6*Math.PI*2;c.beginPath();c.arc(x+Math.cos(a)*5.5*s,fy+Math.sin(a)*5.5*s,3.5*s,0,Math.PI*2);c.fill();}c.fillStyle='#fff9c4';c.beginPath();c.arc(x,fy,3*s,0,Math.PI*2);c.fill();}
function sun(c,x,y,li){c.fillStyle='#FAC775';c.beginPath();c.arc(x,y,12+li*1.8,0,Math.PI*2);c.fill();}
function cloud(c,x,y){c.fillStyle='rgba(255,255,255,0.82)';[{dx:0,dy:0,r:10},{dx:-12,dy:4,r:8},{dx:12,dy:4,r:8},{dx:-5,dy:9,r:7},{dx:5,dy:9,r:7}].forEach(b=>{c.beginPath();c.arc(x+b.dx,y+b.dy,b.r,0,Math.PI*2);c.fill();});}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
