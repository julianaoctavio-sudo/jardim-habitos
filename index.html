<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jardim de Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g50:#f0f7ee;--g400:#5fa843;--g600:#3a7a28;--g800:#1e4a12;--cream:#faf7f2;--creamdk:#f0ebe2;--tp:#1a1a18;--ts:#5a5a50;--tm:#9a9a88;--bd:rgba(0,0,0,0.08);--sh:0 2px 16px rgba(0,0,0,0.06);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--tp);min-height:100vh;}
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.acard{background:white;border:1px solid var(--bd);border-radius:24px;padding:48px;max-width:400px;width:90%;text-align:center;box-shadow:var(--sh);}
.atitle{font-family:'Fraunces',serif;font-size:28px;font-weight:400;margin-bottom:8px;}
.atitle em{font-style:italic;color:var(--g600);}
.asub{font-size:14px;color:var(--ts);margin-bottom:32px;line-height:1.6;}
.obtn{width:100%;padding:13px 20px;border-radius:12px;border:1.5px solid var(--bd);background:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all 0.15s;}
.obtn:hover{background:var(--cream);transform:translateY(-1px);}
.obtn svg{width:20px;height:20px;flex-shrink:0;}
#app{display:none;}
.topbar{background:white;border-bottom:1px solid var(--bd);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Fraunces',serif;font-size:19px;font-weight:400;color:var(--g800);}
.logo em{font-style:italic;color:var(--g600);}
.uavatar{width:34px;height:34px;border-radius:50%;background:#d4eacc;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--g800);overflow:hidden;}
.uavatar img{width:100%;height:100%;object-fit:cover;}
.btnout{font-size:13px;color:var(--tm);background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:6px;font-family:'DM Sans',sans-serif;}
.btnout:hover{color:var(--tp);background:var(--creamdk);}
.main{max-width:1000px;margin:0 auto;padding:28px 20px;}
.mhdr{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.mnbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bd);background:white;cursor:pointer;font-size:15px;color:var(--ts);display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.mnbtn:hover{background:var(--g50);color:var(--g600);}
.mtitle{font-family:'Fraunces',serif;font-size:24px;font-weight:400;flex:1;}
.mtitle em{font-style:italic;color:var(--g600);}

.page-card{background:white;border:1px solid var(--bd);border-radius:18px;overflow:hidden;box-shadow:var(--sh);margin-bottom:28px;}
.page-hdr{padding:18px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.page-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:white;flex-shrink:0;}
.page-name{font-family:'Fraunces',serif;font-size:18px;font-weight:400;color:var(--tp);flex:1;}
.page-stats{display:flex;gap:12px;align-items:center;margin-right:8px;}
.pstat{font-size:11px;color:var(--tm);}
.pstat strong{color:var(--g600);font-weight:500;}
.page-btns{display:flex;gap:7px;}
.bsm{padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--ts);transition:all 0.15s;white-space:nowrap;}
.bsm:hover{background:var(--creamdk);}
.bsmg{background:var(--g600);color:white;border-color:var(--g600);}
.bsmg:hover{background:var(--g800);color:white;}
.garden-wrap{position:relative;}
.garden-wrap canvas{width:100%;height:90px;display:block;}
.gpill{position:absolute;bottom:6px;right:10px;background:rgba(255,255,255,0.92);border:1px solid var(--bd);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:500;color:var(--g800);}
.pprog{padding:8px 24px 10px;border-bottom:1px solid var(--bd);}
.ptrack{height:4px;background:var(--creamdk);border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#5fa843,#2e9475);transition:width 0.5s;}
.plabel{font-size:10px;color:var(--tm);margin-top:4px;}
.hscroll{overflow-x:auto;}
table.ht{width:100%;border-collapse:collapse;min-width:360px;}
.ht thead th{padding:7px 3px;text-align:center;font-size:10px;font-weight:400;color:var(--tm);border-bottom:1px solid var(--bd);white-space:nowrap;}
.ht thead th:first-child{text-align:left;padding-left:20px;width:160px;}
.ht tbody tr:hover{background:var(--cream);}
.ht tbody td{padding:7px 3px;text-align:center;border-bottom:1px solid rgba(0,0,0,0.04);vertical-align:middle;}
.ht tbody td:first-child{text-align:left;padding-left:20px;}
.hrow{display:flex;align-items:center;gap:7px;}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.htext{font-size:12px;color:var(--tp);}
.hbdg{font-size:10px;color:var(--tm);background:var(--creamdk);padding:2px 6px;border-radius:7px;white-space:nowrap;}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bd);background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.12s;}
.chk:not(.done):not(.fut):hover{border-color:#5fa843;background:var(--g50);}
.chk.done{border-color:transparent;}
.chk.done svg{display:block;}
.chk svg{display:none;width:11px;height:11px;}
.chk.tod{box-shadow:0 0 0 2px #4a9bb5;}
.chk.fut{opacity:0.2;pointer-events:none;}
.todm{font-size:9px;font-weight:500;color:#4a9bb5;}
.nohab{padding:20px;text-align:center;font-size:13px;color:var(--tm);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.38);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:18px;padding:28px;width:90%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.15);transform:translateY(14px);transition:transform 0.2s;max-height:88vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.mtit{font-family:'Fraunces',serif;font-size:20px;font-weight:400;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:500;color:var(--ts);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.06em;}
.fi{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--tp);background:white;}
.fi:focus{outline:none;border-color:#5fa843;}
.swrow{display:flex;gap:7px;flex-wrap:wrap;}
.sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;}
.sw.sel{border-color:var(--tp);transform:scale(1.15);}
.macts{display:flex;gap:9px;margin-top:20px;}
.bprim{flex:1;padding:11px;border-radius:9px;background:var(--g600);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background 0.15s;}
.bprim:hover{background:var(--g800);}
.bcanc{padding:11px 18px;border-radius:9px;background:none;color:var(--ts);border:1px solid var(--bd);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.bcanc:hover{background:var(--cream);}
.mrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bd);}
.mrow:last-child{border-bottom:none;}
.mdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mname{flex:1;font-size:13px;color:var(--tp);}
.mpts{font-size:11px;color:var(--tm);background:var(--creamdk);padding:2px 7px;border-radius:9px;white-space:nowrap;}
.bdel{padding:5px 11px;border-radius:7px;border:1px solid #fecaca;background:#fff5f5;color:#dc2626;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;white-space:nowrap;}
.bdel:hover{background:#fee2e2;}
.emptyml{padding:18px;text-align:center;font-size:13px;color:var(--tm);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--tp);color:white;padding:11px 18px;border-radius:9px;font-size:13px;z-index:9999;transform:translateY(18px);opacity:0;transition:all 0.3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:700px){.topbar{padding:0 14px;}.page-hdr{gap:8px;}.page-btns{flex-direction:column;}}
</style>
</head>
<body>

<div id="auth">
  <div class="acard">
    <div style="font-size:36px;margin-bottom:16px;">🌱</div>
    <h1 class="atitle">Jardim de <em>Hábitos</em></h1>
    <p class="asub">Cultive seus hábitos e veja seu jardim florescer.</p>
    <button class="obtn" onclick="signIn('google')">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar com Google
    </button>
    <button class="obtn" onclick="signIn('github')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z" fill="currentColor"/></svg>
      Entrar com GitHub
    </button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="logo">🌿 Jardim de <em>Hábitos</em></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="uavatar" id="uavatar">?</div>
      <button class="btnout" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="mhdr">
      <button class="mnbtn" onclick="changeMonth(-1)">&#8592;</button>
      <h1 class="mtitle" id="mtitle"></h1>
      <button class="mnbtn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div id="cards-container"></div>
  </div>
</div>

<div class="overlay" id="ov-habit" onclick="ovClose(event,'ov-habit',closeHabitMod)">
  <div class="modal">
    <h2 class="mtit">Novo hábito</h2>
    <div class="fg"><label class="fl">Nome</label><input class="fi" id="h-name" placeholder="Ex: Meditar 10 minutos"/></div>
    <div class="fg"><label class="fl">Pontos por dia</label><input class="fi" id="h-pts" type="number" min="1" max="100" value="5"/></div>
    <div class="fg"><label class="fl">Cor</label><div class="swrow" id="hb-swatches"></div></div>
    <div class="macts">
      <button class="bcanc" onclick="closeHabitMod()">Cancelar</button>
      <button class="bprim" onclick="saveHabit()">Salvar</button>
    </div>
  </div>
</div>

<div class="overlay" id="ov-manage" onclick="ovClose(event,'ov-manage',closeManageMod)">
  <div class="modal">
    <h2 class="mtit" id="manage-title">Gerenciar hábitos</h2>
    <div id="manage-list"></div>
    <div class="macts"><button class="bprim" onclick="closeManageMod()">Fechar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://sfxkjpohlijxyvbzrabb.supabase.co';
const SB_KEY='sb_publishable_qJQDvdFTQauCM40w10ir8A_axz95xi6';
const {createClient}=supabase;
const db=createClient(SB_URL,SB_KEY);

const MES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const HCORS=['#5fa843','#4a9bb5','#e8a020','#c9607a','#2e9475','#7b6db5','#c86040','#8b6f4e'];
const ACORS=['#3a7a28','#1a5fa8','#a03060','#b87010','#1a6b50','#5a4a9a'];
const DHABITS=[
  {name:'Acordar cedo',pts:5,color:'#e8a020'},
  {name:'Treino / academia',pts:10,color:'#4a9bb5'},
  {name:'Alimentação saudável',pts:7,color:'#5fa843'},
  {name:'Ler / estudar',pts:8,color:'#7b6db5'}
];
const LEVELS=[
  {name:'Semente',min:0},{name:'Broto',min:50},{name:'Muda',min:150},
  {name:'Arbusto',min:300},{name:'Jardim florido',min:500},
  {name:'Jardim exuberante',min:800},{name:'Paraíso verde',min:1200}
];

let user=null,yr=new Date().getFullYear(),mo=new Date().getMonth();
let people=[],selHC=HCORS[0],actPid=null;

// FLAG: rastreia pessoas que já tiveram hábitos padrão criados nesta sessão
const initializedPeople=new Set();

async function signIn(p){await db.auth.signInWithOAuth({provider:p,options:{redirectTo:window.location.href}});}
async function logout(){await db.auth.signOut();location.reload();}

async function init(){
  const {data:{session}}=await db.auth.getSession();
  if(session){user=session.user;await startApp();}
  else showAuth();
  db.auth.onAuthStateChange(async(_,s)=>{if(s){user=s.user;await startApp();}else showAuth();});
}

function showAuth(){document.getElementById('auth').style.display='flex';document.getElementById('app').style.display='none';}

async function startApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
  const meta=user.user_metadata;
  const el=document.getElementById('uavatar');
  if(meta.avatar_url)el.innerHTML=`<img src="${meta.avatar_url}" alt=""/>`;
  else el.textContent=(meta.full_name||user.email||'?')[0].toUpperCase();
  await loadAll();
  render();
}

async function loadAll(){
  // Busca pessoas
  const {data:pd}=await db.from('people').select('*').eq('user_id',user.id).order('created_at');
  let raw=pd||[];

  // Cria pessoa padrão só se não existir nenhuma
  if(!raw.length){
    await db.from('people').insert({user_id:user.id,name:'Eu',color:ACORS[0]});
    const {data:p2}=await db.from('people').select('*').eq('user_id',user.id).order('created_at');
    raw=p2||[];
  }

  const fd=`${yr}-${String(mo+1).padStart(2,'0')}-01`;
  const ld=`${yr}-${String(mo+1).padStart(2,'0')}-${diasMes()}`;
  people=[];

  for(const p of raw){
    // Busca hábitos desta pessoa
    const {data:hd}=await db.from('habits').select('*').eq('person_id',p.id).order('created_at');
    let habs=hd||[];

    // Cria hábitos padrão APENAS se:
    // 1. Não há nenhum hábito
    // 2. Esta pessoa ainda não foi inicializada nesta sessão
    if(!habs.length && !initializedPeople.has(p.id)){
      initializedPeople.add(p.id);
      for(const h of DHABITS){
        await db.from('habits').insert({user_id:user.id,person_id:p.id,...h});
      }
      const {data:h2}=await db.from('habits').select('*').eq('person_id',p.id).order('created_at');
      habs=h2||[];
    }

    // Busca marcações do mês
    const {data:cd}=await db.from('habit_checks').select('*').eq('person_id',p.id).gte('check_date',fd).lte('check_date',ld);
    const chks={};
    (cd||[]).forEach(c=>{chks[`${c.habit_id}_${c.check_date}`]=c.id;});
    people.push({...p,habs,chks});
  }
}

function diasMes(){return new Date(yr,mo+1,0).getDate();}
function hoje(){const n=new Date();return{y:n.getFullYear(),m:n.getMonth(),d:n.getDate()};}
function getLvl(pts){let i=0;for(let j=LEVELS.length-1;j>=0;j--){if(pts>=LEVELS[j].min){i=j;break;}}return i;}
function pPts(p){let t=0;for(const k in p.chks){const hid=k.split('_')[0];const h=p.habs.find(x=>x.id==hid);if(h)t+=h.pts;}return t;}

async function toggle(pid,hid,day){
  const p=people.find(x=>x.id===pid);if(!p)return;
  const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const key=`${hid}_${ds}`;
  if(p.chks[key]){
    await db.from('habit_checks').delete().eq('id',p.chks[key]);
    delete p.chks[key];
  }else{
    const {data}=await db.from('habit_checks').insert({user_id:user.id,person_id:pid,habit_id:hid,check_date:ds}).select().single();
    if(data)p.chks[key]=data.id;
  }
  render();
}

async function changeMonth(d){
  mo+=d;
  if(mo>11){mo=0;yr++;}
  if(mo<0){mo=11;yr--;}
  await loadAll();
  render();
}

function render(){
  document.getElementById('mtitle').innerHTML=`${MES[mo]} <em>${yr}</em>`;
  const container=document.getElementById('cards-container');
  container.innerHTML='';
  people.forEach(p=>container.appendChild(buildCard(p)));
}

function buildCard(person){
  const days=diasMes(),hj=hoje(),pts=pPts(person);
  const li=getLvl(pts),lv=LEVELS[li],nx=LEVELS[li+1];
  const pi=pts-lv.min,pn=nx?nx.min-lv.min:1;
  const pct=Math.min(100,Math.round(pi/pn*100));
  const tc=Object.keys(person.chks).length;

  const card=document.createElement('div');
  card.className='page-card';
  card.innerHTML=`
    <div class="page-hdr">
      <div class="page-avatar" style="background:${person.color}">${person.name[0].toUpperCase()}</div>
      <span class="page-name">${person.name}</span>
      <div class="page-stats">
        <span class="pstat"><strong>${pts}</strong> pts</span>
        <span class="pstat" style="color:var(--bd)">·</span>
        <span class="pstat"><strong>${tc}</strong> feitos</span>
        <span class="pstat" style="color:var(--bd)">·</span>
        <span class="pstat">Nível <strong>${li+1}</strong> — ${lv.name}</span>
      </div>
      <div class="page-btns">
        <button class="bsm" onclick="openManageMod('${person.id}')">⚙ Gerenciar</button>
        <button class="bsm bsmg" onclick="openHabitMod('${person.id}')">+ Hábito</button>
      </div>
    </div>
    <div class="garden-wrap">
      <canvas id="gc-${person.id}"></canvas>
      <div class="gpill">🌿 ${lv.name}</div>
    </div>
    <div class="pprog">
      <div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="plabel">${nx?`${pi} / ${pn} pts para o próximo nível`:'Nível máximo!'}</div>
    </div>
    <div class="hscroll">
      ${!person.habs.length?'<div class="nohab">Nenhum hábito. Clique em "+ Hábito" para adicionar.</div>':''}
      <table class="ht" style="${!person.habs.length?'display:none':''}">
        <thead id="th-${person.id}"></thead>
        <tbody id="tb-${person.id}"></tbody>
      </table>
    </div>`;

  const th=card.querySelector(`#th-${person.id}`);
  let h='<tr><th>Hábito</th>';
  for(let d=1;d<=days;d++){
    const it=hj.y===yr&&hj.m===mo&&hj.d===d;
    h+=`<th>${it?'<div class="todm">hoje</div>':''}${d}</th>`;
  }
  th.innerHTML=h+'</tr>';

  const tb=card.querySelector(`#tb-${person.id}`);
  tb.innerHTML=person.habs.map(hab=>{
    let r=`<tr><td><div class="hrow"><div class="hdot" style="background:${hab.color}"></div><span class="htext">${hab.name}</span><span class="hbdg">${hab.pts}pts</span></div></td>`;
    for(let d=1;d<=days;d++){
      const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const key=`${hab.id}_${ds}`,done=!!person.chks[key];
      const it=hj.y===yr&&hj.m===mo&&hj.d===d;
      const fut=yr>hj.y||(yr===hj.y&&mo>hj.m)||(yr===hj.y&&mo===hj.m&&d>hj.d);
      const cls=['chk',done?'done':'',it?'tod':'',fut?'fut':''].filter(Boolean).join(' ');
      r+=`<td><button class="${cls}" style="${done?`background:${hab.color};`:''}" onclick="toggle('${person.id}','${hab.id}',${d})"><svg viewBox="0 0 11 11" fill="none"><path d="M1 5.5l3 3 6-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button></td>`;
    }
    return r+'</tr>';
  }).join('');

  setTimeout(()=>{const c=card.querySelector(`#gc-${person.id}`);if(c)drawG(c,li);},50);
  return card;
}

function openHabitMod(pid){
  actPid=pid;selHC=HCORS[0];
  document.getElementById('hb-swatches').innerHTML=HCORS.map(c=>`<div class="sw${c===selHC?' sel':''}" style="background:${c}" onclick="selH('${c}',this)"></div>`).join('');
  document.getElementById('h-name').value='';
  document.getElementById('h-pts').value='5';
  document.getElementById('ov-habit').classList.add('open');
  setTimeout(()=>document.getElementById('h-name').focus(),100);
}
function closeHabitMod(){document.getElementById('ov-habit').classList.remove('open');}
function selH(c,el){selHC=c;document.querySelectorAll('#hb-swatches .sw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
async function saveHabit(){
  const name=document.getElementById('h-name').value.trim();
  const pts=parseInt(document.getElementById('h-pts').value)||5;
  if(!name||!actPid)return;
  const {data,error}=await db.from('habits').insert({user_id:user.id,person_id:actPid,name,pts,color:selHC}).select().single();
  if(error){toast('Erro ao salvar hábito.');return;}
  const p=people.find(x=>x.id===actPid);
  if(p){
    p.habs.push(data);
    // Marca esta pessoa como já inicializada para não recriar padrões
    initializedPeople.add(actPid);
  }
  closeHabitMod();
  render();
  toast('Hábito adicionado!');
}

function openManageMod(pid){
  actPid=pid;
  const p=people.find(x=>x.id===pid);if(!p)return;
  document.getElementById('manage-title').textContent=`Hábitos de ${p.name}`;
  renderManageList(p);
  document.getElementById('ov-manage').classList.add('open');
}

function renderManageList(p){
  const el=document.getElementById('manage-list');
  if(!p.habs.length){
    el.innerHTML='<div class="emptyml">Nenhum hábito cadastrado.</div>';
    return;
  }
  el.innerHTML=p.habs.map(h=>`
    <div class="mrow" id="mr-${h.id}">
      <div class="mdot" style="background:${h.color}"></div>
      <span class="mname">${h.name}</span>
      <span class="mpts">${h.pts} pts</span>
      <button class="bdel" onclick="delHabit('${p.id}','${h.id}')">Excluir</button>
    </div>`).join('');
}

function closeManageMod(){document.getElementById('ov-manage').classList.remove('open');}

async function delHabit(pid,hid){
  if(!confirm('Excluir hábito? As marcações também serão removidas.'))return;

  // 1. Apaga marcações do hábito
  await db.from('habit_checks').delete().eq('habit_id',hid);

  // 2. Apaga o hábito do banco
  const {error}=await db.from('habits').delete().eq('id',hid);
  if(error){toast('Erro ao excluir. Tente novamente.');return;}

  // 3. Atualiza memória local
  const p=people.find(x=>x.id===pid);
  if(p){
    p.habs=p.habs.filter(h=>h.id!==hid);
    Object.keys(p.chks).filter(k=>k.startsWith(hid+'_')).forEach(k=>delete p.chks[k]);
    // Marca como inicializada para não recriar hábitos padrão
    initializedPeople.add(pid);
    renderManageList(p);
  }
  render();
  toast('Hábito excluído!');
}

function ovClose(e,id,fn){if(e.target===document.getElementById(id))fn();}

function drawG(canvas,li){
  const ctx=canvas.getContext('2d'),W=canvas.offsetWidth||900,H=90;
  canvas.width=W*(window.devicePixelRatio||1);canvas.height=H*(window.devicePixelRatio||1);
  ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);
  const sk=['#d4f0c0','#c8ecf0','#c0e4f8','#b8e8f4','#a8e0f0','#90d8e8','#78c8e0'];
  ctx.fillStyle=sk[Math.min(li,6)];ctx.fillRect(0,0,W,H);
  const gY=H-20;
  ctx.fillStyle='#8bc34a';ctx.fillRect(0,gY,W,9);
  ctx.fillStyle='#6d4c41';ctx.fillRect(0,gY+9,W,H-gY-9);
  sun(ctx,W-28,22,li);
  if(li>=2)cloud(ctx,42,18);
  if(li===0){ctx.fillStyle='#795548';ctx.beginPath();ctx.ellipse(W/2,gY-3,5,7,0.3,0,Math.PI*2);ctx.fill();}
  else if(li===1)sprout(ctx,W/2,gY,.75);
  else if(li===2){plant(ctx,W/2,gY,.75);flower(ctx,W*.22,gY,'#e8a020',.52);flower(ctx,W*.78,gY,'#c9607a',.52);}
  else if(li===3){bush(ctx,W/2,gY,.82);flower(ctx,W*.1,gY,'#e8a020',.68);flower(ctx,W*.28,gY,'#c9607a',.68);flower(ctx,W*.72,gY,'#7b6db5',.68);flower(ctx,W*.9,gY,'#4a9bb5',.68);}
  else if(li===4){tree(ctx,W/2,gY,'#2e9475',.88);bush(ctx,W*.15,gY,.58);bush(ctx,W*.85,gY,.58);['#e8a020','#c9607a','#7b6db5','#4a9bb5','#c86040','#2e9475'].forEach((c,i)=>flower(ctx,W*.07+W*.86*i/5,gY,c,.72));}
  else if(li===5){tree(ctx,W*.32,gY,'#2e9475',.98);tree(ctx,W*.68,gY,'#1a6b4a',.82);bush(ctx,W*.07,gY,.62);bush(ctx,W*.93,gY,.62);['#e8a020','#c9607a','#7b6db5','#4a9bb5','#c86040','#2e9475','#e8a020','#c9607a'].forEach((c,i)=>flower(ctx,W*.03+W*.94*i/7,gY,c,.8));}
  else{tree(ctx,W*.18,gY,'#2e9475',1.02);tree(ctx,W*.5,gY,'#1a6b4a',1.18);tree(ctx,W*.82,gY,'#2e9475',.92);bush(ctx,W*.05,gY,.72);bush(ctx,W*.95,gY,.72);['#e8a020','#c9607a','#7b6db5','#4a9bb5','#c86040','#2e9475','#e8a020','#c9607a','#7b6db5','#4a9bb5'].forEach((c,i)=>flower(ctx,W*.02+W*.96*i/9,gY,c,.88));}
}
function sprout(c,x,y,s){c.strokeStyle='#4caf50';c.lineWidth=2*s;c.beginPath();c.moveTo(x,y);c.lineTo(x,y-20*s);c.stroke();c.fillStyle='#66bb6a';c.beginPath();c.ellipse(x-6*s,y-15*s,6*s,4*s,-.5,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(x+7*s,y-20*s,6*s,4*s,.5,0,Math.PI*2);c.fill();}
function plant(c,x,y,s){c.strokeStyle='#388e3c';c.lineWidth=2*s;c.beginPath();c.moveTo(x,y);c.lineTo(x,y-28*s);c.stroke();c.fillStyle='#4caf50';for(let i=0;i<3;i++){c.beginPath();c.ellipse(i%2===0?x-10*s:x+10*s,y-12*s-i*9*s,9*s,5*s,i%2===0?-.4:.4,0,Math.PI*2);c.fill();}}
function bush(c,x,y,s){[['#388e3c',0,-18,13],['#4caf50',-11,-11,10],['#4caf50',11,-11,10],['#66bb6a',-6,-26,8],['#66bb6a',6,-26,8]].forEach(([col,dx,dy,r])=>{c.fillStyle=col;c.beginPath();c.arc(x+dx*s,y+dy*s,r*s,0,Math.PI*2);c.fill();});}
function tree(c,x,y,col,s){c.fillStyle='#795548';c.fillRect(x-4*s,y-36*s,8*s,36*s);c.fillStyle=col;c.beginPath();c.arc(x,y-60*s,21*s,0,Math.PI*2);c.fill();c.fillStyle='#1a5c38';c.beginPath();c.arc(x,y-78*s,16*s,0,Math.PI*2);c.fill();c.fillStyle=col;c.beginPath();c.arc(x,y-90*s,11*s,0,Math.PI*2);c.fill();}
function flower(c,x,y,col,s){const fy=y-12*s-3*s;c.strokeStyle='#4caf50';c.lineWidth=1.2*s;c.beginPath();c.moveTo(x,y);c.lineTo(x,fy+3*s);c.stroke();c.fillStyle=col;for(let i=0;i<6;i++){const a=i/6*Math.PI*2;c.beginPath();c.arc(x+Math.cos(a)*5*s,fy+Math.sin(a)*5*s,3.2*s,0,Math.PI*2);c.fill();}c.fillStyle='#fff9c4';c.beginPath();c.arc(x,fy,2.8*s,0,Math.PI*2);c.fill();}
function sun(c,x,y,li){c.fillStyle='#FAC775';c.beginPath();c.arc(x,y,11+li*1.5,0,Math.PI*2);c.fill();}
function cloud(c,x,y){c.fillStyle='rgba(255,255,255,0.82)';[{dx:0,dy:0,r:9},{dx:-10,dy:4,r:7},{dx:10,dy:4,r:7},{dx:-4,dy:8,r:6},{dx:4,dy:8,r:6}].forEach(b=>{c.beginPath();c.arc(x+b.dx,y+b.dy,b.r,0,Math.PI*2);c.fill();});}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
